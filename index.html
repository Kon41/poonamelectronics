const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";

// ---------- App-install gate ----------
// The HTML file only runs as a real screen once it has been installed as an
// app (Add to Home Screen / PWA install) via the Firebase-hosted link. When
// opened as a plain browser tab it shows an "install required" screen instead.
function isRunningAsInstalledApp(){
  const standaloneMedia = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
  const iosStandalone = window.navigator.standalone === true;
  return !!(standaloneMedia || iosStandalone);
}

// ---------- Daily login + biometric/device-lock session ----------
// Flow:
//  - First time today: full Username + Password login (Staff or Admin).
//  - Right after that login succeeds, the device's fingerprint / Face ID /
//    device screen-lock is registered (first time) or simply confirmed.
//  - If the user/admin leaves and reopens the app later the SAME calendar
//    day, they are NOT asked for username/password again — only for
//    fingerprint or device lock.
//  - The next calendar day, the cycle starts again: Username + Password,
//    then Fingerprint / device lock.
const AUTH_SESSION_KEY = "pe_auth_session_v1";

function todayKey(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
}
function loadAuthSession(){
  try{
    const raw = localStorage.getItem(AUTH_SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveAuthSession(sess){
  try{ localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(sess)); }catch(e){}
}
function clearAuthSession(){
  try{ localStorage.removeItem(AUTH_SESSION_KEY); }catch(e){}
}
// Returns: null (no session / need full login) | {needsBiometric:true, role, username} | {ready:true, role, username}
function getAuthStatus(){
  const sess = loadAuthSession();
  if (!sess || sess.dateKey !== todayKey()) return null;
  if (!sess.passwordOkToday) return null;
  if (!sess.biometricOkToday) return { needsBiometric: true, role: sess.role, username: sess.username };
  return { ready: true, role: sess.role, username: sess.username };
}
function markPasswordVerified(role, username){
  saveAuthSession({ dateKey: todayKey(), role, username, passwordOkToday: true, biometricOkToday: false });
}
function markBiometricVerified(){
  const sess = loadAuthSession();
  if (!sess) return;
  sess.biometricOkToday = true;
  saveAuthSession(sess);
}

function b64urlToBuffer(s){
  const pad = '='.repeat((4 - s.length % 4) % 4);
  const base64 = (s + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  const buf = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) buf[i] = raw.charCodeAt(i);
  return buf;
}
function bufferToB64url(buf){
  let str = '';
  const bytes = new Uint8Array(buf);
  for (let i=0;i<bytes.length;i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function webAuthnSupported(){
  return !!(window.PublicKeyCredential && navigator.credentials);
}
function credKeyFor(username){ return "pe_webauthn_cred_" + username; }
function pinKeyFor(username){ return "pe_pin_" + username; }

// Registers a biometric / device-lock credential for this user on this device (first time only).
async function registerBiometric(username){
  if (!webAuthnSupported()) return false;
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: "Poonam Electronics" },
        user: { id: userId, name: username, displayName: username },
        pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
        timeout: 60000,
        attestation: "none"
      }
    });
    if (!cred) return false;
    localStorage.setItem(credKeyFor(username), bufferToB64url(cred.rawId));
    return true;
  }catch(e){
    console.warn("Biometric registration failed/declined:", e);
    return false;
  }
}
// Asks the device for fingerprint / Face ID / screen-lock confirmation.
async function verifyBiometric(username){
  if (!webAuthnSupported()) return false;
  const storedId = localStorage.getItem(credKeyFor(username));
  if (!storedId) return false;
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: b64urlToBuffer(storedId), type: "public-key" }],
        userVerification: "required",
        timeout: 60000
      }
    });
    return !!assertion;
  }catch(e){
    console.warn("Biometric verification failed/declined:", e);
    return false;
  }
}
function hasBiometricRegistered(username){
  return !!localStorage.getItem(credKeyFor(username));
}
// Simple PIN fallback (used only when WebAuthn / device biometrics aren't available on this device).
function hasPinSet(username){ return !!localStorage.getItem(pinKeyFor(username)); }
function setPin(username, pin){ localStorage.setItem(pinKeyFor(username), String(pin)); }
function checkPin(username, pin){ return localStorage.getItem(pinKeyFor(username)) === String(pin); }

const UNIT_OPTIONS = ["pc","bundle","meter","ft","inch","coil","box","roll","set","kg","gram","litre","dozen","pair","sq.ft","packet"];
const PAYMENT_MODES = ["Cash","UPI","Udhaar","Custom"];
const SETTLE_PAYMENT_MODES = ["Cash","UPI","Cheque","Bank Transfer","Custom"];

const DEFAULT_RATES = [
  { id: "r1", name: "Copper Wire 1.5mm (Finolex)", unit: "coil", price: 2450, updated: Date.now(), visible: true },

  { id: "r5", name: "MCB 32A", unit: "pc", price: 180, updated: Date.now(), visible: true },
  { id: "r6", name: "LED Bulb 9W", unit: "pc", price: 65, updated: Date.now(), visible: true }
];

// ---------- Firebase ----------
const firebaseConfig = {
  apiKey: "AIzaSyCxFXHhfM0bVh1Tl0kE5p4BctGPFqS3GIg",
  authDomain: "poonam-electronics.firebaseapp.com",

  projectId: "poonam-electronics",
  storageBucket: "poonam-electronics.firebasestorage.app",
  messagingSenderId: "51602193400",
  appId: "1:51602193400:web:db2a0b609db713bf5ab40d"

let db = null;
let firebaseReady = false;
let firebaseError = "";
let connected = false;

try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  firebaseReady = true;

  firebaseError = "Could not connect to the live database. Check your internet connection and reload.";

// ---------- generic per-record CRUD helpers ----------
function newId(prefix){ return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }
function dbCreate(node, data){
  const id = data.id || newId(node);
  data.id = id;
  return db.ref(node + "/" + id).set(data).then(()=>id);
}
function dbUpdate(node, id, patch){ return db.ref(node + "/" + id).update(patch).catch(e=>{ console.error(e); alert("Could not save the change — check your connection and try again."); throw e; }); }
function dbSet(node, id, data){ return db.ref(node + "/" + id).set(data).catch(e=>{ console.error(e); alert("Could not save — check your connection and try again."); throw e; }); }
function dbRemove(node, id){ return db.ref(node + "/" + id).remove().catch(e=>{ console.error(e); alert("Could not delete — check your connection and try again."); throw e; }); }

function attachListener(node, key){
  db.ref(node).on("value", (snap)=>{
    const val = snap.val();
    syncOpenModalFromDom();
    // IMPORTANT: always trust the real Firebase key as this record's identity, never
    // whatever "id" (or "username") happens to be stored inside the value. If those
    // ever drift apart — e.g. an old record saved before an id existed, a manual edit
    // in the Firebase console, or any past save that wrote to a different path than
    // its own id field — editing/deleting would silently target the wrong path and
    // look like "nothing happens" or "it created a duplicate instead of updating".
    // Re-stamping the key here on every read makes that class of bug impossible.
    state[key] = val ? Object.keys(val).map(k=>{
      const rec = Object.assign({}, val[k], { id: k });
      if (node === "staff") rec.username = k;
      return rec;
    }) : [];
    state.lastSync = Date.now();

    // Security: if the admin deletes (or renames) the staff account that is
    // currently logged in on this device, force that session out immediately —
    // it must not be able to keep creating or editing entries after removal.
    if (key === "staffList" && state.role === 'staff' && state.currentUser){
      const stillExists = state.staffList.some(s => s.username === state.currentUser);
      if (!stillExists){
        forceLogoutStaffRemoved();
        return;
      }

    render();

// ---------- image compression ----------
function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    if (!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if (width > maxDim || height > maxDim){
          if (width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fmtMoney(n){ const v = Number(n)||0; return "₹" + v.toLocaleString("en-IN", {maximumFractionDigits:2}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtTime(ts){ if(!ts) return "—"; const d = new Date(ts); return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"}) + " · " + d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}); }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
function currentStaffRecord(){
  if (state.role !== 'staff' || !state.currentUser) return null;
  return state.staffList.find(s => s.username === state.currentUser) || null;
}
function staffHasPermission(staffRec, perm){
  if (!staffRec) return false;
  if (!staffRec.permissions) return perm === 'editProducts'; // legacy accounts: could manage products, couldn't delete others' entries
  if (perm === 'editProducts') return staffRec.permissions.editProducts !== false;
  return !!staffRec.permissions[perm];
}
function canModifyEntry(e){
  if (state.role === "admin") return true;
  if (state.role !== "staff") return false;
  if (e.createdBy === state.currentUser) return true;
  return staffHasPermission(currentStaffRecord(), 'deleteAny');
}
function canManageProducts(){
  if (state.role === 'admin') return true;
  return staffHasPermission(currentStaffRecord(), 'editProducts');
}
function paymentModeLabel(e){
  if (!e || !e.paymentMode) return "—";
  if (e.paymentMode === 'Custom') return escapeHtml(e.customPaymentMode || 'Custom');
  return escapeHtml(e.paymentMode);
}
function recordTotal(e){ return Number(e.totalAmount != null ? e.totalAmount : e.amount) || 0; }
function paidSoFar(e){ return Number(e.paidAmount) || 0; }
function remainingDue(e){ return Math.max(0, Math.round((recordTotal(e) - paidSoFar(e)) * 100) / 100); }
function isFullySettled(e){ return e.paymentMode === 'Udhaar' && remainingDue(e) <= 0.004; }
function isUdhaar(e){ return e && e.paymentMode === 'Udhaar' && remainingDue(e) > 0.004; }

// ---------- PDF invoice generation ----------
function pdfHeader(doc, title){
  doc.setFont("helvetica", "bold");
  doc.setFontSize(16);
  doc.text("Poonam Electronics", 14, 18);
  doc.setFontSize(10);
  doc.setFont("helvetica", "normal");
  doc.text(title, 14, 25);
  doc.setDrawColor(181,101,29);
  doc.setLineWidth(0.8);
  doc.line(14, 28, 196, 28);
}
function pdfAddImage(doc, base64, y){
  try{
    const props = doc.getImageProperties(base64);
    const maxW = 120, maxH = 90;
    let w = props.width, h = props.height;
    const ratio = Math.min(maxW/w, maxH/h, 1);
    w = w*ratio; h = h*ratio;
    if (y + h > 285){ doc.addPage(); y = 20; }
    doc.text("Attached photo:", 14, y);
    doc.addImage(base64, "JPEG", 14, y+4, w, h);
    return y + h + 12;
  }catch(e){ return y; }
}
function pdfAddUdhaarHistory(doc, record, y){
  if (record.paymentMode !== 'Udhaar') return y;
  if (y > 250){ doc.addPage(); y = 20; }
  doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("Udhaar (Credit) Payment History", 14, y);
  y += 7;
  doc.setDrawColor(200,200,200); doc.setLineWidth(0.2); doc.line(14, y, 196, y);
  y += 6;
  doc.setFontSize(10);
  const payments = record.payments || [];
  if (!payments.length){
    doc.setFont("helvetica","normal");
    doc.text("No payments received yet.", 14, y);
    y += 7;
  } else {
    payments.forEach(p=>{
      if (y > 280){ doc.addPage(); y = 20; }
      doc.setFont("helvetica","normal");
      const mode = p.mode === 'Custom' ? (p.customMode || 'Custom') : p.mode;
      doc.text(mode + "  —  " + fmtMoney(p.amount) + "  —  " + fmtTime(p.timestamp), 14, y);
      y += 7;
    });
  }
  const due = remainingDue(record);
  doc.setFont("helvetica","bold");
  if (isFullySettled(record)){
    doc.text("Status: Fully paid" + (record.settledAt ? " on " + fmtTime(record.settledAt) : ""), 14, y);
  } else {
    doc.text("Status: " + fmtMoney(due) + " still due", 14, y);
  }
  y += 10;
  return y;
}

let gisTokenClient = null;
function initGoogleDrive(){
  if (!GOOGLE_CLIENT_ID || !window.google || !window.google.accounts) return;
  gisTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async (resp)=>{
      if (resp.error){ alert("Google sign-in failed. Try again."); return; }
      await uploadBackupToDrive(resp.access_token);
    }
  });
}
async function uploadBackupToDrive(accessToken){
  const data = JSON.stringify(buildBackupObject(), null, 2);
  const fileName = "poonam-electronics-backup-" + todayStr() + ".json";
  const metadata = { name: fileName, mimeType: "application/json" };
  const boundary = "poonamboundary";
  const body =
    "--" + boundary + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" + JSON.stringify(metadata) +
    "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + data +
    "\r\n--" + boundary + "--";
  try{
    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method: "POST",
      headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "multipart/related; boundary=" + boundary },
      body
    });
    if (res.ok){ alert('Backup uploaded to Google Drive as "' + fileName + '".'); }
    else { alert("Drive upload failed. Please try again."); }
  }catch(e){ alert("Drive upload failed: " + e.message); }
}
function backupToDrive(){
  if (!GOOGLE_CLIENT_ID){ alert("Google Drive backup isn't set up yet. Ask your developer to add a Google Client ID."); return; }
  if (!gisTokenClient){ initGoogleDrive(); }
  if (gisTokenClient) gisTokenClient.requestAccessToken();
}

function bindBiometric(){
  const sess = loadAuthSession();
  const authKey = sess ? (sess.username || ADMIN_USER) : "";
  const supported = webAuthnSupported();
  const registered = authKey && hasBiometricRegistered(authKey);
  const usePin = !supported || !registered;

  const forceLogin = document.getElementById("forceFullLogin");
  if (forceLogin) forceLogin.onclick = (e)=>{
    e.preventDefault();
    clearAuthSession();
    state.screen = 'login'; state.biometricErr=''; state.pinEntry='';
    render();
  };

  if (usePin){
    const pinBtn = document.getElementById("pinSubmit");
    if (pinBtn) pinBtn.onclick = ()=>{
      const pin = (document.getElementById("pinInput").value || "").trim();
      if (!/^\d{4,6}$/.test(pin)){ state.biometricErr = "Enter a 4–6 digit PIN."; state.pinEntry = pin; render(); return; }
      if (!hasPinSet(authKey)){
        setPin(authKey, pin);
        markBiometricVerified();
        state.screen = 'app'; state.biometricErr=''; state.pinEntry='';
        render();
        return;
      }
      if (checkPin(authKey, pin)){
        markBiometricVerified();
        state.screen = 'app'; state.biometricErr=''; state.pinEntry='';
        render();
      } else {
        state.biometricErr = "Incorrect PIN.";
        state.pinEntry = '';
        render();
      }
    };
  } else {
    const bioBtn = document.getElementById("biometricSubmit");
    if (bioBtn) bioBtn.onclick = async ()=>{
      state.biometricBusy = true; state.biometricErr=''; render();
      const ok = await verifyBiometric(authKey);
      state.biometricBusy = false;
      if (ok){
        markBiometricVerified();
        state.screen = 'app';
        render();
      } else {
        state.biometricErr = "Fingerprint/Face ID not confirmed. Try again.";
        render();
      }
    };
  }
}

async function completeLoginSuccess(role, username){
  markPasswordVerified(role, username);
  state.role = role;
  state.currentUser = username; // null for admin
  state.loginErr=''; state.loginUser=''; state.loginPass='';
  if (role === 'staff' && username && firebaseReady) setupPresence(username);

  // For admin, use a fixed key so the same device-lock/PIN setup is reused.
  const authKey = username || ADMIN_USER;
  if (webAuthnSupported()){
    if (!hasBiometricRegistered(authKey)){
      // First time on this device for this account — register fingerprint/Face ID/device lock now.
      const registered = await registerBiometric(authKey);
      if (registered){
        markBiometricVerified();
        state.screen = 'app';
        render();
        return;
      }
      // Declined or unavailable — fall back to PIN setup on the biometric screen.
    }
  }
  // Either WebAuthn isn't supported, or registration didn't complete — ask via the biometric screen
  // (it will offer PIN setup automatically when no fingerprint credential exists).
  state.screen = 'biometric';
  render();
}

function bindLogin(){
  document.getElementById("tabStaff").onclick = ()=>{ state.loginMode='staff'; state.loginErr=''; render(); };
  document.getElementById("tabAdmin").onclick = ()=>{ state.loginMode='admin'; state.loginErr=''; render(); };
  const staffBtn = document.getElementById("staffEnter");
  if (staffBtn){
    staffBtn.onclick = async ()=>{
      const u = document.getElementById("staffUser").value.trim();
      const p = document.getElementById("staffPass").value;
      const match = state.staffList.find(s => s.username === u && s.password === p);
      if (match){
        await completeLoginSuccess('staff', u);
      } else {
        state.loginErr = state.staffList.length ? "Incorrect username or password." : "No staff accounts exist yet — ask the admin to create one.";
        state.loginUser = u; state.loginPass = p;
        render();
      }
    };
  }
  const adminBtn = document.getElementById("adminEnter");
  if (adminBtn){
    adminBtn.onclick = async ()=>{
      const u = document.getElementById("adminUser").value.trim();
      const p = document.getElementById("adminPass").value;
      if (u === ADMIN_USER && p === ADMIN_PASS){
        await completeLoginSuccess('admin', null);
      } else {
        state.loginErr = "Incorrect admin ID or password.";
        state.loginUser = u; state.loginPass = p;
        render();
      }
    };
  }
}

function sortNewestFirst(arr){
  return arr.slice().sort((a,b)=>{
    // Primary: date descending (YYYY-MM-DD string compare works correctly)
    if (b.date !== a.date) return b.date > a.date ? 1 : -1;
    // Tiebreaker: createdAt timestamp descending (newer entries at top within same day)
    return (b.createdAt||0) - (a.createdAt||0);
  });
}

    list = list.filter(e => (e.party||'').toLowerCase().includes(q) || (e.note||'').toLowerCase().includes(q));

}

function udhaarEntries(){
  let ledgerDue = state.ledger.filter(isUdhaar).map(e => ({ kind:'ledger', id:e.id, date:e.date, timestamp:e.timestamp, name:e.party||'—', total:recordTotal(e), paid:paidSoFar(e), due:remainingDue(e), ref:e }));
  let billDue = state.longLedger.filter(isUdhaar).map(b => ({ kind:'bill', id:b.id, date:b.date, timestamp:b.timestamp, name:b.customerName||'—', total:recordTotal(b), paid:paidSoFar(b), due:remainingDue(b), ref:b }));
  let all = ledgerDue.concat(billDue);
  if (state.udhaarSearch && state.udhaarSearch.trim()){
    const q = state.udhaarSearch.trim().toLowerCase();
    all = all.filter(r => r.name.toLowerCase().includes(q));
  }
  return all.sort((a,b)=>{
    if (b.date !== a.date) return b.date > a.date ? 1 : -1;
    return (b.timestamp||0) - (a.timestamp||0);
  });
}

// Snapshots whatever is currently typed into the open modal's form fields back into
// state.modal.data. This must run before any re-render that wasn't triggered by the
// modal itself — e.g. a live Firebase update arriving while an admin/staff member is
// mid-edit — otherwise the rebuild reads stale state and the typed values disappear
// (the form looks "stuck" or refuses to accept edits).
function syncOpenModalFromDom(){
  if (!state.modal) return;
  const m = state.modal;
  if (!m.data) m.data = {};
  const getVal = (id) => { const el = document.getElementById(id); return el ? el.value : undefined; };

  if (m.type === 'rate'){
    if (getVal("mName") !== undefined) m.data.name = getVal("mName");
    if (getVal("mUnit") !== undefined) m.data.unit = getVal("mUnit");
    if (getVal("mPrice") !== undefined) m.data.price = getVal("mPrice");
    const visEl = document.getElementById("mVisible");
    if (visEl) m.data.visible = visEl.checked;
  } else if (m.type === 'ledger'){
    if (getVal("mType") !== undefined) m.data.type = getVal("mType");
    if (getVal("mDate") !== undefined) m.data.date = getVal("mDate");
    if (getVal("mParty") !== undefined) m.data.party = getVal("mParty");
    if (getVal("mAmount") !== undefined) m.data.amount = getVal("mAmount");
    if (getVal("mNote") !== undefined) m.data.note = getVal("mNote");
    if (getVal("mPaymentMode") !== undefined) m.data.paymentMode = getVal("mPaymentMode");
    if (getVal("mCustomPaymentMode") !== undefined) m.data.customPaymentMode = getVal("mCustomPaymentMode");
  } else if (m.type === 'longledger'){
    syncLongLedgerItemsFromDom();
    if (getVal("mPaymentMode") !== undefined) m.data.paymentMode = getVal("mPaymentMode");
    if (getVal("mCustomPaymentMode") !== undefined) m.data.customPaymentMode = getVal("mCustomPaymentMode");
  } else if (m.type === 'udhaarPayment'){
    if (getVal("mSettleMode") !== undefined) m.data.mode = getVal("mSettleMode");
    if (getVal("mSettleCustomMode") !== undefined) m.data.customMode = getVal("mSettleCustomMode");
    if (getVal("mSettleAmount") !== undefined) m.data.amount = getVal("mSettleAmount");
  } else if (m.type === 'pickDailyRate'){
    if (getVal("pickerSearchInput") !== undefined) m.data.search = getVal("pickerSearchInput");
  } else if (m.type === 'staff'){
    if (getVal("mStaffName") !== undefined) m.data.name = getVal("mStaffName");
    if (getVal("mStaffUser") !== undefined) m.data.username = getVal("mStaffUser");
    if (getVal("mStaffPass") !== undefined) m.data.password = getVal("mStaffPass");
  }
}

// ---------- Long Ledger line-item helpers (operate on state.modal.data.items) ----------
function syncLongLedgerItemsFromDom(){
  if (!state.modal || !state.modal.data) return;
  const items = [];
  document.querySelectorAll("[data-line-row]").forEach(row=>{
    const idx = row.dataset.lineRow;
    const pEl = document.getElementById("liProduct_"+idx);
    const qEl = document.getElementById("liQty_"+idx);
    const uEl = document.getElementById("liUnit_"+idx);
    const rEl = document.getElementById("liRate_"+idx);
    const product = pEl ? pEl.value.trim() : "";
    const qty = qEl ? (parseFloat(qEl.value)||0) : 0;
    const unit = uEl ? uEl.value.trim() : "";
    const rate = rEl ? (parseFloat(rEl.value)||0) : 0;
    items.push({ product, qty, unit, rate, amount: qty*rate });
  });
  state.modal.data.items = items;

  // Also preserve the rest of the bill form (date / customer / note) so that
  // adding or removing a line — which re-renders the whole modal — doesn't
  // wipe out what's already been typed into these fields.
  const dateEl = document.getElementById("mDate");
  const custNameEl = document.getElementById("mCustName");
  const custPhoneEl = document.getElementById("mCustPhone");
  const custAddrEl = document.getElementById("mCustAddress");
  const noteEl = document.getElementById("mNote");
  const paymentModeEl = document.getElementById("mPaymentMode");
  const customPaymentModeEl = document.getElementById("mCustomPaymentMode");
  if (dateEl) state.modal.data.date = dateEl.value;
  if (custNameEl) state.modal.data.customerName = custNameEl.value;
  if (custPhoneEl) state.modal.data.customerPhone = custPhoneEl.value;
  if (custAddrEl) state.modal.data.customerAddress = custAddrEl.value;
  if (noteEl) state.modal.data.note = noteEl.value;
  if (paymentModeEl) state.modal.data.paymentMode = paymentModeEl.value;
  if (customPaymentModeEl) state.modal.data.customPaymentMode = customPaymentModeEl.value;
}
function addLongLedgerLine(){
  syncLongLedgerItemsFromDom();
  state.modal.data.items.push({product:"",qty:1,unit:"pc",rate:0,amount:0});
  render();
}
function removeLongLedgerLine(idx){
  syncLongLedgerItemsFromDom();
  state.modal.data.items.splice(idx,1);
  if (state.modal.data.items.length === 0) state.modal.data.items.push({product:"",qty:1,unit:"pc",rate:0,amount:0});
  render();
}
function recalcLongLedgerRow(){
  recalcLongLedgerTotal();
}
function recalcLongLedgerTotal(){
  let total = 0;
  document.querySelectorAll("[data-line-row]").forEach(row=>{
    const idx = row.dataset.lineRow;
    const qEl = document.getElementById("liQty_"+idx);
    const rEl = document.getElementById("liRate_"+idx);
    const amtEl = document.getElementById("liAmount_"+idx);
    const qty = qEl ? (parseFloat(qEl.value)||0) : 0;
    const rate = rEl ? (parseFloat(rEl.value)||0) : 0;
    if (amtEl) amtEl.textContent = fmtMoney(qty*rate);
    total += qty*rate;
  });
  const el = document.getElementById("grandTotalVal");
  if (el) el.textContent = fmtMoney(total);
}
function autofillLineFromProduct(idx){
  const nameInput = document.getElementById("liProduct_"+idx);
  if (!nameInput) return;
  const match = state.rates.find(r => r.name.toLowerCase() === nameInput.value.trim().toLowerCase());
  if (match){
    const unitEl = document.getElementById("liUnit_"+idx);
    const rateEl = document.getElementById("liRate_"+idx);
    if (unitEl) unitEl.value = match.unit;
    if (rateEl && (!rateEl.value || parseFloat(rateEl.value)===0)) rateEl.value = match.price;
    recalcLongLedgerRow(idx);
  }
}

// ---------- modal rendering ----------
function renderPaymentHistoryBlock(e){
  if (e.paymentMode !== 'Udhaar') return '';
  const payments = e.payments || [];
  const due = remainingDue(e);
  const settled = isFullySettled(e);
  const paymentRows = payments.map(p => `
    <div style="font-size:12.5px;display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid var(--paper-line);">
      <span>${escapeHtml(p.mode === 'Custom' ? (p.customMode||'Custom') : p.mode)}</span>
      <span class="mono">${fmtMoney(p.amount)}</span>
      <span style="color:var(--ink-soft);">${fmtTime(p.timestamp)}</span>
    </div>
  `).join("");
  return `
    <div style="margin-top:4px;padding:10px 12px;border:1px solid var(--paper-line);border-radius:9px;background:#FBF8F0;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong style="font-size:12.5px;">${settled ? 'Udhaar — Fully Settled' : 'Udhaar — Payment Status'}</strong>
        <span class="${settled ? 'amt pos' : 'amt neg'} mono" style="font-size:13px;">${settled ? 'Paid in full' : fmtMoney(due) + ' due'}</span>
      </div>
      ${payments.length ? `<div style="margin-top:8px;">${paymentRows}</div>` : `<div style="font-size:12px;color:var(--ink-soft);margin-top:6px;">No payments received yet.</div>`}
      ${settled && e.settledAt ? `<div style="font-size:11px;color:var(--ink-soft);margin-top:6px;">Fully paid on ${fmtTime(e.settledAt)}</div>` : ``}
    </div>
  `;
}

          <div><strong>Created:</strong> ${fmtTime(b.timestamp)}</div>
        </div>
        <div style="overflow-x:auto;"><table><thead><tr><th>Product</th><th>Qty</th><th>Unit</th><th>Rate</th><th style="text-align:right;">Amount</th></tr></thead><tbody>${rows}</tbody></table></div>
        <div class="grand-total-row" style="margin-top:10px;"><span>Grand Total</span><span class="val">${fmtMoney(b.totalAmount)}</span></div>
        ${b.note ? `<p style="font-size:12.5px;color:var(--ink-soft);margin-top:10px;"><strong>Note:</strong> ${escapeHtml(b.note)}</p>` : ``}
        ${b.image ? `<div style="margin-top:10px;"><strong style="font-size:13px;">Photo:</strong><br/><img src="${b.image}" class="img-thumb" id="detailImgThumb"/></div>` : ``}
        ${renderPaymentHistoryBlock(b)}
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modalCancel">Close</button>
          <button class="btn btn-ghost" id="detailDownload">${ICONS.download} Invoice</button>
          ${isUdhaar(b) ? `<button class="btn btn-copper" id="detailRecordPayment">Payment received</button>` : ``}
          ${canMod ? `<button class="btn btn-ghost" id="detailEdit">${ICONS.edit} Edit</button>` : ``}
          ${canMod ? `<button class="btn btn-danger" id="detailDelete">${ICONS.trash} Delete</button>` : ``}
        </div>
      </div>
    </div>`;
  }

  if (m.type === 'udhaarPayment'){
    const d = m.data || {};
    const ref = d.kind === 'ledger' ? state.ledger.find(e=>e.id===d.id) : state.longLedger.find(b=>b.id===d.id);
    if (!ref) return "";
    const due = remainingDue(ref);
    const who = d.kind === 'ledger' ? (ref.party || '—') : (ref.customerName || '—');
    return `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h3>Payment received</h3>
        <p class="desc">${escapeHtml(who)} — ${fmtMoney(due)} currently due.</p>
        <div class="field"><label>Payment mode</label>
          <select id="mSettleMode">
            <option value="">Select payment mode</option>
            ${SETTLE_PAYMENT_MODES.map(p=>`<option value="${p}" ${d.mode===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        ${d.mode === 'Custom' ? `<div class="field"><label>Custom payment mode</label><input type="text" id="mSettleCustomMode" value="${escapeAttr(d.customMode||'')}" placeholder="e.g. Bank transfer"/></div>` : ``}
        <div class="field"><label>Amount received (₹)</label><input type="number" id="mSettleAmount" value="${d.amount ?? due}" placeholder="0"/></div>
        <p style="font-size:11.5px;color:var(--ink-soft);margin:-4px 0 0;">If this is less than the full due amount, the invoice stays in Udhaar with the remaining balance. If it covers the full due amount, the invoice moves out of Udhaar automatically.</p>
        <div class="err" id="modalErr"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button class="btn btn-copper" id="modalSave">Save payment</button>
        </div>
      </div>
    </div>`;
  }

  if (m.type === 'staff'){
    const d = m.data || {};
    const perms = d.permissions || {};
    const canEditProducts = perms.editProducts !== false;
    const canDeleteAny = !!perms.deleteAny;
    return `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h3>${d.editing ? 'Edit staff account' : 'Create staff account'}</h3>
        <p class="desc">${d.editing ? "Update this worker's login details and permissions." : 'Choose the username and password yourself — share them with the worker.'}</p>
        <div class="field"><label>Full name (optional)</label><input type="text" id="mStaffName" value="${escapeAttr(d.name||'')}" placeholder="e.g. Ramesh Kumar"/></div>
        <div class="field"><label>Username</label><input type="text" id="mStaffUser" value="${escapeAttr(d.username||'')}" placeholder="e.g. ramesh"/></div>
        <div class="field"><label>Password</label><input type="text" id="mStaffPass" value="${escapeAttr(d.password||'')}" placeholder="Choose a password"/></div>
        <div class="field">
          <label>Permissions</label>
          <div class="perm-box">
            <div class="perm-row"><input type="checkbox" id="mPermEditProducts" ${canEditProducts?'checked':''}/><label for="mPermEditProducts" style="margin:0;font-weight:500;">Can add / edit / delete products</label></div>
            <div class="perm-row"><input type="checkbox" id="mPermDeleteAny" ${canDeleteAny?'checked':''}/><label for="mPermDeleteAny" style="margin:0;font-weight:500;">Can delete any invoice (not just their own)</label></div>
          </div>
        </div>
        <div class="err" id="modalErr"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button class="btn btn-copper" id="modalSave">${d.editing ? 'Save changes' : 'Create account'}</button>
        </div>
      </div>
    </div>`;
  }

  return "";
}

// ---------- event binding ----------
function bindApp(){
  document.getElementById("logoutBtn").onclick = ()=>{
    if (state.role === 'staff' && state.currentUser) markStaffLoggedOut(state.currentUser);
    state.role=null; state.currentUser=null;
    state.loginPass=''; state.loginUser=''; state.loginErr='';
    // Logging out doesn't clear today's verified session — re-entering today
    // only asks for fingerprint/device lock, per the daily login flow.
    // To fully sign out (e.g. switching accounts), use "Not you?" on that screen.
    const status = getAuthStatus();
    if (status && status.needsBiometric){
      state.screen = 'biometric';
    } else {
      clearAuthSession();
      state.screen = 'login';
    }
    render();
  };
  document.querySelectorAll(".tab").forEach(b=>{
    b.onclick = ()=>{ state.tab = b.dataset.tab; render(); };
  });

  if (state.tab === 'rates'){
    const addBtnDaily = document.getElementById("addRateBtnFromDaily");
    if (addBtnDaily) addBtnDaily.onclick = ()=>{ state.modal = {type:'pickDailyRate', data:{search:''}}; render(); };
    const rSearch = document.getElementById("ratesSearch");
    if (rSearch){ rSearch.oninput = (e)=>{ state.ratesSearch = e.target.value; render(); }; }
  }

  if (state.tab === 'products'){
    const addBtn = document.getElementById("addRateBtn");
    if (addBtn) addBtn.onclick = ()=>{ state.modal = {type:'rate', data:{}}; render(); };
    const pSearch = document.getElementById("productsSearch");
    if (pSearch){ pSearch.oninput = (e)=>{ state.productsSearch = e.target.value; render(); }; }
    document.querySelectorAll("[data-edit-rate]").forEach(b=>{
      b.onclick = ()=>{
        const id = b.dataset.editRate;
        const item = state.rates.find(r=>r.id===id);
        state.modal = {type:'rate', data: Object.assign({}, item)};
        render();
      };
    });
    document.querySelectorAll("[data-del-rate]").forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.delRate;
        if (!confirm("Remove this product from the rate card?")) return;
        await dbRemove("rates", id);
      };
    });
  }

  if (state.tab === 'ledger'){
    document.getElementById("addLedgerBtn").onclick = ()=>{ state.modal = {type:'ledger', data:{}}; render(); };
    document.getElementById("ledgerFilter").onchange = (e)=>{ state.ledgerFilter = e.target.value; render(); };
    const lSearch = document.getElementById("ledgerSearch");
    if (lSearch){ lSearch.oninput = (e)=>{ state.ledgerSearch = e.target.value; render(); }; }
    document.querySelectorAll("[data-row-id]").forEach(tr=>{
      tr.onclick = ()=>{
        const id = tr.dataset.rowId;
        const entry = state.ledger.find(e=>e.id===id);
        if (entry) { state.modal = {type:'entryDetail', data: entry}; render(); }
      };
    });
  }

  if (state.tab === 'longledger'){
    document.getElementById("addBillBtn").onclick = ()=>{ state.modal = {type:'longledger', data:{}}; render(); };
    document.getElementById("longLedgerFilter").onchange = (e)=>{ state.longLedgerFilter = e.target.value; render(); };
    const llSearch = document.getElementById("longLedgerSearch");
    if (llSearch){ llSearch.oninput = (e)=>{ state.longLedgerSearch = e.target.value; render(); }; }
    document.querySelectorAll("[data-bill-id]").forEach(tr=>{
      tr.onclick = ()=>{
        const id = tr.dataset.billId;
        const bill = state.longLedger.find(b=>b.id===id);
        if (bill) { state.modal = {type:'billDetail', data: bill}; render(); }
      };
    });
  }

  if (state.tab === 'udhaar'){
    const uSearch = document.getElementById("udhaarSearch");
    if (uSearch){ uSearch.oninput = (e)=>{ state.udhaarSearch = e.target.value; render(); }; }
    document.querySelectorAll("[data-udhaar-id]").forEach(el=>{
      el.onclick = ()=>{
        const id = el.dataset.udhaarId;
        const kind = el.dataset.udhaarKind;
        if (kind === 'ledger'){
          const entry = state.ledger.find(e=>e.id===id);
          if (entry) { state.modal = {type:'entryDetail', data: entry}; render(); }
        } else {
          const bill = state.longLedger.find(b=>b.id===id);
          if (bill) { state.modal = {type:'billDetail', data: bill}; render(); }
        }
      };
    });
    document.querySelectorAll("[data-pay-id]").forEach(btn=>{
      btn.onclick = (ev)=>{
        ev.stopPropagation();
        const id = btn.dataset.payId;
        const kind = btn.dataset.payKind;
        openUdhaarPaymentModal(kind, id);
      };
    });
  }

  if (state.tab === 'admin' && state.role === 'admin'){
    const subStaff = document.getElementById("adminSubStaff");
    const subBackup = document.getElementById("adminSubBackup");
    if (subStaff) subStaff.onclick = ()=>{ state.adminSubTab='staff'; render(); };
    if (subBackup) subBackup.onclick = ()=>{ state.adminSubTab='backup'; render(); };

    if (state.adminSubTab === 'staff'){
      const addStaff = document.getElementById("addStaffBtn");
      if (addStaff) addStaff.onclick = ()=>{ state.modal = {type:'staff', data:{}}; render(); };
      document.querySelectorAll("[data-edit-staff]").forEach(b=>{
        b.onclick = ()=>{
          const username = b.dataset.editStaff;
          const item = state.staffList.find(s=>s.username===username);
          state.modal = {type:'staff', data: Object.assign({editing:true}, item)};
          render();
        };
      });
      document.querySelectorAll("[data-del-staff]").forEach(b=>{
        b.onclick = async ()=>{
          const username = b.dataset.delStaff;
          if (!confirm(`Remove staff account "${username}"? They won't be able to log in anymore.`)) return;
          await dbRemove("staff", username);
        };
      });
    }

    if (state.adminSubTab === 'backup'){
      const localBtn = document.getElementById("localBackupBtn");
      if (localBtn) localBtn.onclick = downloadLocalBackup;
      const driveBtn = document.getElementById("driveBackupBtn");
      if (driveBtn) driveBtn.onclick = backupToDrive;
      const cleanupBtn = document.getElementById("cleanupBtn");
      if (cleanupBtn) cleanupBtn.onclick = async ()=>{
        const confirmTxt = document.getElementById("cleanupConfirm").value.trim();
        const cutoff = document.getElementById("cleanupDate").value;
        if (confirmTxt !== "DELETE"){ alert('Type DELETE exactly to confirm.'); return; }
        if (!cutoff){ alert('Pick a cutoff date.'); return; }
        if (!confirm(`Permanently delete all ledger & bill entries before ${cutoff}? Make sure you've backed up first.`)) return;
        const count = await cleanupOldEntries(cutoff);
        alert(count + " old entries removed.");
      };
      const wipeBtn = document.getElementById("wipeBtn");
      if (wipeBtn) wipeBtn.onclick = async ()=>{
        const confirmTxt = document.getElementById("wipeConfirm").value.trim();
        if (confirmTxt !== "DELETE ALL"){ alert('Type DELETE ALL exactly to confirm.'); return; }
        if (!confirm("This removes EVERY ledger entry and bill permanently. Make sure you've backed up first. Continue?")) return;
        await deleteAllLedgerHistory();
        alert("All ledger history removed.");
      };
    }
  }

  if (state.modal) bindModal();
}

function bindModal(){
  const overlay = document.getElementById("overlay");
  overlay.addEventListener("click", (e)=>{ if (e.target === overlay){ state.modal=null; render(); } });
  const cancelBtn = document.getElementById("modalCancel");
  if (cancelBtn) cancelBtn.onclick = ()=>{ state.modal=null; render(); };

  const m = state.modal;

  // shared image upload handlers for ledger + longledger forms
  const imgInput = document.getElementById("mImageFile");
  if (imgInput) imgInput.onchange = async (ev)=>{
    const file = ev.target.files[0];
    if (!file) return;
    // Snapshot whatever is typed in the form BEFORE compressing + re-rendering,
    // so none of the party/customer/amount/note fields get wiped.
    syncOpenModalFromDom();
    const compressed = await compressImage(file, 1000, 0.7);
    m.data.image = compressed;
    render();
  };
  const imgRemove = document.getElementById("mImageRemove");
  if (imgRemove) imgRemove.onclick = ()=>{
    syncOpenModalFromDom();
    m.data.image = null;
    render();
  };

  if (m.type === 'ledger' || m.type === 'longledger'){
    const pmSel = document.getElementById("mPaymentMode");
    if (pmSel) pmSel.onchange = ()=>{
      syncOpenModalFromDom();
      render();
    };
  }

  if (m.type === 'entryDetail' || m.type === 'billDetail'){
    const thumb = document.getElementById("detailImgThumb");
    if (thumb) thumb.onclick = ()=>{ state.lightboxImg = m.data.image; render(); };
    const dlBtn = document.getElementById("detailDownload");
    if (dlBtn) dlBtn.onclick = ()=>{ m.type === 'entryDetail' ? downloadEntryInvoice(m.data) : downloadBillInvoice(m.data); };
    const editBtn = document.getElementById("detailEdit");
    if (editBtn) editBtn.onclick = ()=>{
      state.modal = { type: m.type === 'entryDetail' ? 'ledger' : 'longledger', data: Object.assign({}, m.data) };
      render();
    };
    const delBtn = document.getElementById("detailDelete");
    if (delBtn) delBtn.onclick = async ()=>{
      if (!confirm("Delete this entry? This can't be undone.")) return;
      const node = m.type === 'entryDetail' ? 'ledger' : 'longLedger';
      await dbRemove(node, m.data.id);
      state.modal = null;
      render();
    };
    const payBtn = document.getElementById("detailRecordPayment");
    if (payBtn) payBtn.onclick = ()=>{
      openUdhaarPaymentModal(m.type === 'entryDetail' ? 'ledger' : 'bill', m.data.id);
    };
    return;
  }

  if (m.type === 'udhaarPayment'){
    const modeSel = document.getElementById("mSettleMode");
    if (modeSel) modeSel.onchange = ()=>{
      m.data.mode = modeSel.value;
      const amtEl = document.getElementById("mSettleAmount");
      if (amtEl) m.data.amount = amtEl.value;
      const cmEl = document.getElementById("mSettleCustomMode");
      if (cmEl) m.data.customMode = cmEl.value;
      render();
    };
    const saveBtn = document.getElementById("modalSave");
    if (saveBtn) saveBtn.onclick = async ()=>{
      const errEl = document.getElementById("modalErr");
      const mode = document.getElementById("mSettleMode").value;
      const customMode = document.getElementById("mSettleCustomMode") ? document.getElementById("mSettleCustomMode").value.trim() : '';
      const amount = parseFloat(document.getElementById("mSettleAmount").value);
      if (!mode){ errEl.textContent = "Please choose a payment mode."; return; }
      if (mode === 'Custom' && !customMode){ errEl.textContent = "Please name the custom payment mode."; return; }
      if (isNaN(amount) || amount <= 0){ errEl.textContent = "Please enter a valid amount received."; return; }
      const node = m.data.kind === 'ledger' ? 'ledger' : 'longLedger';
      const ref = m.data.kind === 'ledger' ? state.ledger.find(e=>e.id===m.data.id) : state.longLedger.find(b=>b.id===m.data.id);
      if (!ref){ errEl.textContent = "This record could no longer be found."; return; }
      const due = remainingDue(ref);
      if (amount > due + 0.01){ errEl.textContent = "That's more than the amount currently due (" + fmtMoney(due) + ")."; return; }
      const payments = (ref.payments || []).concat([{ mode, customMode: mode==='Custom' ? customMode : '', amount, timestamp: Date.now() }]);
      const newPaid = (Number(ref.paidAmount)||0) + amount;
      const total = recordTotal(ref);
      const patch = { payments, paidAmount: newPaid };
      if (newPaid >= total - 0.004) patch.settledAt = Date.now();
      await dbUpdate(node, ref.id, patch);
      state.modal = null;
      render();
    };
    return;
  }

  if (m.type === 'pickDailyRate'){
    const searchInput = document.getElementById("pickerSearchInput");
    if (searchInput) searchInput.oninput = (e)=>{ m.data.search = e.target.value; render(); };
    document.querySelectorAll("[data-add-to-daily]").forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.addToDaily;
        await dbUpdate("rates", id, { visible: true });
      };
    });
    return;
  }

  const saveBtn = document.getElementById("modalSave");
  if (!saveBtn) return;
  saveBtn.onclick = async ()=>{
    const errEl = document.getElementById("modalErr");

    if (m.type === 'rate'){
      const name = document.getElementById("mName").value.trim();
      const unit = document.getElementById("mUnit").value.trim();
      const price = parseFloat(document.getElementById("mPrice").value);
      const visible = !!document.getElementById("mVisible").checked;
      if (!name || !unit || isNaN(price) || price < 0){ errEl.textContent = "Please fill in name, unit and a valid price."; return; }
      const id = m.data.id || newId("rate");
      await dbSet("rates", id, { id, name, unit, price, visible, updated: Date.now() });
      state.modal = null; render();

    } else if (m.type === 'ledger'){
      const type = document.getElementById("mType").value;
      const date = document.getElementById("mDate").value || todayStr();
      const party = document.getElementById("mParty").value.trim();
      const amount = parseFloat(document.getElementById("mAmount").value);
      const note = document.getElementById("mNote").value.trim();
      const paymentMode = document.getElementById("mPaymentMode").value;
      const customPaymentMode = paymentMode === 'Custom' ? (document.getElementById("mCustomPaymentMode")?.value.trim() || '') : '';
      if (isNaN(amount) || amount <= 0){ errEl.textContent = "Please enter a valid amount."; return; }
      if (paymentMode === 'Custom' && !customPaymentMode){ errEl.textContent = "Please name the custom payment mode."; return; }
      const id = m.data.id || newId("entry");
      const createdBy = m.data.createdBy || (state.role === 'admin' ? 'Admin' : state.currentUser);
      const timestamp = m.data.timestamp || Date.now();
      await dbSet("ledger", id, { id, type, date, party, amount, note, createdBy, paymentMode: paymentMode || null, customPaymentMode: customPaymentMode || null, timestamp, image: m.data.image || null });
      state.modal = null; render();

    } else if (m.type === 'longledger'){
      syncLongLedgerItemsFromDom();
      const date = document.getElementById("mDate").value || todayStr();
      const customerName = document.getElementById("mCustName").value.trim();
      const customerPhone = document.getElementById("mCustPhone").value.trim();
      const customerAddress = document.getElementById("mCustAddress").value.trim();
      const note = document.getElementById("mNote").value.trim();
      const paymentMode = document.getElementById("mPaymentMode").value;
      const customPaymentMode = paymentMode === 'Custom' ? (document.getElementById("mCustomPaymentMode")?.value.trim() || '') : '';
      const items = (m.data.items || []).filter(it => it.product && it.qty > 0);
      if (!customerName){ errEl.textContent = "Please enter the customer's name."; return; }
      if (!items.length){ errEl.textContent = "Add at least one product with a quantity."; return; }
      if (paymentMode === 'Custom' && !customPaymentMode){ errEl.textContent = "Please name the custom payment mode."; return; }
      const totalAmount = items.reduce((s,it)=> s + it.amount, 0);
      const id = m.data.id || newId("bill");
      const createdBy = m.data.createdBy || (state.role === 'admin' ? 'Admin' : state.currentUser);
      const timestamp = m.data.timestamp || Date.now();
      await dbSet("longLedger", id, { id, date, customerName, customerPhone, customerAddress, items, totalAmount, note, createdBy, paymentMode: paymentMode || null, customPaymentMode: customPaymentMode || null, timestamp, image: m.data.image || null });
      state.modal = null; render();

    } else if (m.type === 'staff'){
      const name = document.getElementById("mStaffName").value.trim();
      const username = document.getElementById("mStaffUser").value.trim();
      const password = document.getElementById("mStaffPass").value;
      if (!username || !password){ errEl.textContent = "Please enter a username and password."; return; }
      if (/\s/.test(username)){ errEl.textContent = "Username can't contain spaces."; return; }
      if (username === ADMIN_USER){ errEl.textContent = "That username is reserved for the admin account."; return; }
      const isEditing = !!m.data.editing;
      const originalUsername = m.data.username;
      const clashes = state.staffList.some(s => s.username === username && (!isEditing || s.username !== originalUsername));
      if (clashes){ errEl.textContent = "That username is already taken — choose another."; return; }
      const permEditProducts = document.getElementById("mPermEditProducts") ? document.getElementById("mPermEditProducts").checked : true;
      const permDeleteAny = document.getElementById("mPermDeleteAny") ? document.getElementById("mPermDeleteAny").checked : false;
      const permissions = { editProducts: permEditProducts, deleteAny: permDeleteAny };
      const presence = m.data.presence || null;
      if (isEditing && originalUsername !== username){ await dbRemove("staff", originalUsername); }
      await dbSet("staff", username, { name, username, password, permissions, presence, createdAt: m.data.createdAt || Date.now() });
      state.modal = null; render();
    }
  };
}

// ---------- boot ----------
(async function init(){
  root.innerHTML = `<div class="center-screen"><div style="color:#6B5E4D;font-family:'Inter',sans-serif;font-size:13px;">Loading Poonam Electronics…</div></div>`;

  // Gate: only proceed past login if the app is opened as an installed app (PWA / Add to Home Screen).
  if (!isRunningAsInstalledApp()){
    state.screen = 'needsInstall';
    render();
    return;
  }

  // Restore today's session if one exists: skip straight to fingerprint/device-lock,
  // or straight into the app if biometric was already confirmed today.
  const status = getAuthStatus();
  if (status){
    state.role = status.role;
    state.currentUser = status.username || null;
    state.screen = status.ready ? 'app' : 'biometric';
  }

  if (!firebaseReady){ render(); return; }
  try{
    await seedIfEmpty();
    attachAllListeners();
    initGoogleDrive();
  }catch(e){
    firebaseError = "Could not reach the live database. Check your internet connection and reload.";
    console.error(e);
  }
  render();
})();

// Register the PWA service worker (enables "Add to Home Screen" / installable app).
// This only caches the app shell — live data still always comes fresh from Firebase.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch((e) => console.warn("Service worker registration failed:", e));
  });
}
</script>
